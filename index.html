<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>PropFirm Knowledge Journal</title>
    <meta name="description" content="Professional trading journal for prop firm traders. Track your trades, analyze performance, and improve your trading." />
    <meta property="og:title" content="PropFirm Knowledge Journal" />
    <meta property="og:description" content="Professional trading journal for prop firm traders" />
    
    <!-- Mobile App Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PropFirm Journal" />
    <meta name="theme-color" content="#1f1f1f" />
    <meta name="msapplication-navbutton-color" content="#1f1f1f" />
    <meta name="msapplication-TileColor" content="#1f1f1f" />
    
    <!-- Prevent phone number detection -->
    <meta name="format-detection" content="telephone=no" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="https://i.postimg.cc/W31cqNRN/20260117-155732.jpg" />
    <link rel="apple-touch-icon" href="https://i.postimg.cc/W31cqNRN/20260117-155732.jpg" />
    
    <script>
      // 🔥 CRITICAL: Handle asset loading failures (404s on hashed files)
      // This script runs before any modules are loaded.
      window.addEventListener('error', function(e) {
        if (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK') {
          console.error('Asset failed to load:', e.target.src || e.target.href);
          
          // Clear storage to force a clean state
          try {
            localStorage.clear();
            sessionStorage.clear();
            
            // Unregister service workers if possible
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then(function(regs) {
                for(var i = 0; i < regs.length; i++) { regs[i].unregister(); }
              });
            }
          } catch (err) {}

          // Prevent infinite reload loops (wait at least 5 seconds between attempts)
          var reloadKey = 'app_recovery_timestamp';
          var lastReload = sessionStorage.getItem(reloadKey);
          var now = Date.now();
          
          if (!lastReload || (now - parseInt(lastReload) > 5000)) {
            sessionStorage.setItem(reloadKey, now.toString());
            console.log('🔄 Version mismatch detected. Forcing hard reload...');
            window.location.reload(true);
          }
        }
      }, true);
    </script>

    <!-- Splash screen background for smooth loading -->
    <style>
      html, body {
        background-color: #1f1f1f;
        margin: 0;
        padding: 0;
      }
      /* Allow scrolling on all devices */
      html {
        height: 100%;
      }
      body {
        overflow-y: auto;
        overflow-x: hidden;
        height: 100%;
        -webkit-overflow-scrolling: touch;
      }
      #root {
        width: 100%;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
